homeassistant:
  auth_providers:
    - type: trusted_networks
      trusted_networks:
        - 192.168.1.203/32   # Living Room Display
      trusted_users:
        192.168.1.203: mkibby
      allow_bypass_login: true
    - type: homeassistant    # Keep normal login for other devices
# Loads default set of integrations. Do not remove.
default_config:

# Example configuration.yaml entry
media_player:
  - platform: aquostv
    host: 192.168.3.171
    port: 10002	
    name: Living Room Sharp TV

# Example LL-HLS configuration.yaml entry.
stream:
  ll_hls: true
  part_duration: 0.75
  segment_duration: 6

# Example configuration.yaml entry
media_source:


# Example configuration.yaml
homeassistant:
  media_dirs:
    media: /media
#    recording: /mnt/recordings

ffmpeg:

shell_command:
  git_sync: /bin/bash /config/scripts/git_sync.sh


camera:
  - platform: local_file
    file_path: /media/basement/last_door_entry.jpg
    name: Basement Door Last Snapshot

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
switch: !include switch.yaml
sensor: !include sensor.yaml

template: !include templates.yaml
